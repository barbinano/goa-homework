<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fonts Practice</title>


    <link rel="stylesheet" href="homework.css">

   
    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Roboto&family=Merriweather&family=Lato&family=Oswald&display=swap" rel="stylesheet">

</head>
<body>

        <!--  დავალება 1
            შევდივართ Google Fonts-ზე
            ვაკოპირებთ <link> ტეგს HTML ფაილში
            ასევე შეგვიძლია CSS-ში  font-family-ს გამოყენება
        
        -->





        <!-- 
            დავალება 2

            განსხვავება @import და <link> შორის

            <link> 
                იწერება HTML ფაილში
                უფრო სწრაფად იტვირთება
                რეკომენდებულია Google Fonts-ისთვის

            @import
               იწერება CSS ფაილის დასაწყისში
               იტვირთება უფრო ნელა
               გამოიყენება როცა CSS-იდან გვინდა სხვა CSS-ის ჩატვირთვა
        -->

    <!-- 3 -->
    <section>
        <h1 class="title">სათაური</h1>
        <p class="text">
            თუ ენერგეტიკული სასმელია შენი ენერგიის წყარო,  რა ხარ მის გარეშე.
        </p>
    </section>


    <!-- 4 -->
    <div class="quote1">
        <p class="quote2">
            "Not all those who wander are lost."
        </p>
        <p class="author">– J.R.R. Tolkien</p>
    </div>


    <!-- 5 -->
    <section class="hero1">
        <h1 class="hero2">Welcome to My Website</h1>
    </section>

</body>
</html>
