<!--

1. justify-content: flex-start
ელემენტები იწყებენ განლაგებას კონტეინერის დასაწყისიდან (მარცხენა მხრიდან).

2. justify-content: flex-end
ელემენტები განლაგდებიან კონტეინერის ბოლოს (მარჯვენა მხარეს).

3. justify-content: center
ელემენტები მოთავსდება კონტეინერის ცენტრში.

4. justify-content: space-between
პირველი ელემენტი მიდის მარცხნივ, ბოლო — მარჯვნივ,
დანარჩენებს შორის სივრცე თანაბრად ნაწილდება.

5. justify-content: space-around
ყველა ელემენტს გარშემო აქვს თანაბარი სივრცე,
მაგრამ კიდეებზე სივრცე ნახევარია.

6. justify-content: space-evenly
ყველა ელემენტს შორის და კიდეებთანაც ზუსტად თანაბარი სივრცეა.
-->
