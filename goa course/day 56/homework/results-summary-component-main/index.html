<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="homework.css">
  <title>Frontend Mentor | 3-column preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  
  
<div class="card">
  <div class="left">
    <p class="title">Your Result</p>

    <div class="circle">
      <p class="score">76</p>
      <p class="of">of 100</p>
    </div>

    <p class="great">Great</p>
    <p class="desc">
      You scored higher than 65% of the people who have taken these tests.
    </p>
  </div>

  <div class="right">
    <p class="summary">Summary</p>

    <div class="item red">
      <p>Reaction</p>
      <p class="score1"><b>80</b> / 100</p>
    </div>

    <div class="item yellow">
      <p>Memory</p>
      <p class="score1"><b>92</b> / 100</p>
    </div>

    <div class="item green">
      <p>Verbal</p>
      <p class="score1"><b>61</b> / 100</p>
    </div>

    <div class="item blue">
      <p>Visual</p>
      <p class="score1"><b>73</b> / 100</p>
    </div>

    <button>Continue</button>
  </div>
</div>

</body>
</html>
