<!DOCTYPE html>
<html>
<head>
    <title>Simple Forms</title>
    <link rel="stylesheet" href="homework.css">
</head>
<body>

    <!--1 -->
    <div class="form1">
        <h2>Simple Design Form</h2>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button>Login</button>
    </div>

    <!-- 2 -->
    <div class="form2">
        <label>Your name*</label>
        <input type="text">

        <label>Your e-mail*</label>
        <input type="email">
    </div>

    <!--  3 -->
    <div class="form3">
        <label>Last Name</label>
        <input type="text" class="red-input">

        <input type="email" placeholder="Email Address" class="outline-input">
        <input type="email" placeholder="Email Confirm" class="outline-input">
    </div>
    <!-- 4 -->
    <div class="container">
        <label class="label_style">Your name</label>
        <input class="input_style" type="text">

        <label class="label_style">Email Address</label>
        <input class="input_style" type="text">

        <label class="label_style">Subject</label>
        <input class="input_style" type="text">
    </div>

</body>
</html>
